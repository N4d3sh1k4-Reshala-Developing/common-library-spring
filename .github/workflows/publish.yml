name: Publish Common Library

on:
  push:
    branches:
      - master

jobs:
  publish:
    runs-on: ubuntu-latest
    # Важно для публикации в GitHub Packages внутри организации:
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin' # Или 'oracle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Publish package
        run: ./gradlew publish
        env:
          # Используем встроенный токен GitHub, ничего создавать вручную не нужно!
          GHP_USER: ${{ github.actor }}
          GHP_TOKEN: ${{ secrets.GITHUB_TOKEN }}